<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading SYstem Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="app.js" defer></script>
    <style>
        body {
            background: radial-gradient(circle at 0% 0%, #dd7058 0%, #953b27 75%, #6f1a07 100%);
        }   
    </style>
</head>
<body class="vh-100 d-flex flex-column justify-content-center align-items-center">

    <div class="card p-4 shadow-sm" style="width: 450px;">
            <h3 class="card-title text-center mb-4">Grading Computation Engine</h3>

        <div class="mb-3">
            <label for="midterm-input" class="form-label">Enter Midterm Grade (0-100):</label>
            <input type="text" id="midterm-input" class="form-control" placeholder="Enter here...">
        </div>

        <div class="mb-3">
            <label for="finals-input" class="form-label">Enter Finals Grade (0-100):</label>
            <input type="text" id="finals-input" class="form-control" placeholder="Enter here...">
        </div>

        <button id="compute-btn" class="btn btn-success w-100 mb-4">Compute Grade Matrix</button>

        <div class="p-3 bg-white border rounded text-center" id="output-matrix">
            <p class="text-muted m-8">Awaiting system input computation...</p>
        </div>
        
    </div>
</body>
</html>
