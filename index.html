<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaction Matrix Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="app.js" defer></script>
</head>
<body class="bg-light vh-100 d-flex flex-column justify-content-center align-items-center">

    <div class="card p-4 shadow-sm" style="width: 450px;">
            <h3 class="card-title text-center mb-4">Grading & Validation Engine</h3>

        <div class="mb-3">
            <label for="score-input" class="form-label">Enter Raw Numeric Score (0-100):</label>
            <input type="text" id="score-input" class="form-control" placeholder="e.g. 85">
        </div>

        <div class="form-check mb-3">
            <input type="checkbox" id="extra-credit-chk" class="form-check-input">
            <label for="extra-credit-chk" class="form-check-label">Apply Extra Credit (+5 Points)</label>
        </div>

        <button id="compute-btn" class="btn btn-success w-100 mb-4">Compute Grade Matrix</button>

        <div class="p-3 bg-white border rounded text-center" id="output-matrix">
            <p class="text-muted m-8">Awaiting system input computation...</p>
        </div>
        
    </div>
</body>
</html>
